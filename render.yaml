# ============================================================
# AI Research Protocol Assistant — Render Deployment Blueprint
# ============================================================
#
# Use this Blueprint to deploy the entire stack to Render.
# To deploy:
#   1. Push this repository to GitHub or GitLab.
#   2. Go to the Render Dashboard, click "New" -> "Blueprint".
#   3. Select your repository, and Render will configure everything automatically!

services:
  # ── 1. Redis Service (Working Memory & Cache) ────────────────
  - type: keyvalue
    name: protocol-redis
    plan: free
    ipAllowList: [] # Only allow internal network access

  # ── 2. FastAPI Backend (Web Service) ─────────────────────────
  - type: web
    name: protocol-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    # Make sure backend is listening on 0.0.0.0 (Render injects PORT env variable)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: protocol-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: protocol-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: gemini
      - key: FAST_LLM_PROVIDER
        value: groq
      - key: GOOGLE_API_KEY
        sync: false # User enters this in the Render Dashboard
      - key: GROQ_API_KEY
        sync: false # User enters this in the Render Dashboard
      - key: PINECONE_API_KEY
        sync: false # User enters this in the Render Dashboard
      - key: JWT_SECRET_KEY
        generateValue: true # Generates a secure random key automatically
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"

  # ── 3. Vite React Frontend (Static Site) ─────────────────────
  - type: web
    name: protocol-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: protocol-backend
          property: url

databases:
  # ── 4. PostgreSQL Database ───────────────────────────────────
  - name: protocol-db
    databaseName: protocol_assistant
    user: protocol_user
    plan: free
